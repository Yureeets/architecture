name: ML Pipeline CI — Lab 5

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master, main]

jobs:
  # -----------------------------------------------------------------------
  # Крок 1: Linting — перевірка якості Python-коду
  # -----------------------------------------------------------------------
  lint:
    name: "Linting (flake8)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install flake8
        run: pip install flake8

      - name: Lint src/, dags/, tests/
        run: flake8 src/ dags/ tests/

  # -----------------------------------------------------------------------
  # Крок 2: DAG Integrity Test — перевірка коректності DAG-файлів
  # -----------------------------------------------------------------------
  dag-integrity:
    name: "DAG Integrity Test"
    runs-on: ubuntu-latest
    env:
      AIRFLOW__CORE__DAGS_FOLDER: ${{ github.workspace }}/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "sqlite:////tmp/airflow_ci.db"
      AIRFLOW__CORE__EXECUTOR: "LocalExecutor"
      # Dummy шлях до ML-проєкту (тест лише перевіряє синтаксис DAG)
      ML_PROJECT_PATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install "apache-airflow==2.8.1" \
            --constraint "https://raw.githubusercontent.com/apache/airflow/constraints-2.8.1/constraints-3.10.txt"
          pip install pytest

      - name: Initialize Airflow metadata DB
        run: airflow db init

      - name: Run DAG integrity tests
        run: pytest tests/test_dag.py -v --tb=short

  # -----------------------------------------------------------------------
  # Крок 3: Docker Build — перевірка, що Docker-образ збирається
  # -----------------------------------------------------------------------
  docker-build:
    name: "Docker Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ML pipeline image (multi-stage)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          tags: ml-pipeline:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
